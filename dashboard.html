<!DOCTYPE html>
<html lang="it">

<script>
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "login.html";
    }
    const API = "http://localhost:3000/api";

    // per ora simuliamo login
    const TOKEN = localStorage.getItem("token");
</script>
</script>

<head>
    <meta charset="UTF-8" />
    <title>Dashboard Statistiche Match</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: white;
        }

        button.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f1f5f9;
        }

        tr:first-child td {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>📊 Classifica Giocatori</h1>

    <input type="file" id="fileInput" accept="application/json" />

    <div class="controls" id="filters"></div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Giocatore</th>
                <th>Name</th>
                <th>Cognome</th>
                <th id="statHeader">Stat</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="matches">

    </div>

    <script type="module">
        import { STAT } from './enums.js';

        let players = [];
        let currentStat = STAT.ATTACK_WIN;

        const fileInput = document.getElementById('fileInput');
        const filtersDiv = document.getElementById('filters');
        const tableBody = document.getElementById('tableBody');
        const statHeader = document.getElementById('statHeader');


        const res = await fetch(API + "/teams", {
            headers: {
                Authorization: "Bearer " + TOKEN,
            },
        });

        let team = await res.json();

        team = team[0];
        console.log(team);

        loadPlayers(team.id);


        async function loadPlayers(teamId) {
            const [resA, resB] = await Promise.all([
                fetch(API + `/teams/${teamId}/players`, {
                    headers: { Authorization: "Bearer " + TOKEN },
                }),
            ]);

            players = await resA.json();

            console.log(players);
            renderTable();
            //renderTeam(".half.left", playersA);
            //renderTeam(".half.right", playersB);
        }

        const res1 = await fetch(API + "/matches", {

            headers: {
                Authorization: "Bearer " + TOKEN,
            },
        });
        const matches = await res1.json();

        console.log(matches);

        const container = document.getElementById("matches");

        matches.forEach(m => {
            const div = document.createElement("div");
            div.textContent = `Giornata ${m.numberday} — ${new Date(m.date).toLocaleDateString()}`;
            div.onclick = () => openMatch(m.id);
            container.appendChild(div);
        });

        async function openMatch(matchId) {
            const res = await fetch(`http://localhost:3000/api/matches/${matchId}`, {
                headers: {
                    Authorization: "Bearer " + localStorage.getItem("token")
                }
            });

            const match = await res.json();

            localStorage.setItem("openMatch", JSON.stringify(match));

            window.location.href = "timeline.html";
        }

        // --- Caricamento JSON ---
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = () => {
                const json = JSON.parse(reader.result);
                players = extractPlayers(json);
                renderTable();
            };
            reader.readAsText(file);
        });

        // --- Estrazione giocatori dal JSON ---
        function extractPlayers(json) {
            const squads = [json.match?.squadA, json.match?.squadB].filter(Boolean);
            const result = [];

            squads.forEach(squad => {
                [...squad.players, ...squad.bench].forEach(p => {
                    result.push({
                        id: p.id,
                        team: squad.name,
                        stats: p.stats
                    });
                });
            });

            return result;
        }

        // --- Filtri ---
        Object.values(STAT).forEach(stat => {
            const btn = document.createElement('button');
            btn.textContent = stat;
            btn.onclick = () => {
                document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStat = stat;
                renderTable();
            };
            if (stat === currentStat) btn.classList.add('active');
            filtersDiv.appendChild(btn);
        });

        // --- Render tabella ---
        function renderTable() {
            if (!players.length) return;

            statHeader.textContent = currentStat;

            const sorted = [...players].sort((a, b) =>
                (b.stats[currentStat] || 0) - (a.stats[currentStat] || 0)
            );

            tableBody.innerHTML = '';

            sorted.forEach((p, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
        <td>${index + 1}</td>
        <td>${p.id}</td>
        <td>${p.first_name}</td>
        <td>${p.last_name}</td>
        <td>${p.stats[currentStat] || 0}</td>
      `;
                tableBody.appendChild(tr);
            });
        }
    </script>

</body>

</html>
