<head>
    <meta charset="UTF-8" />
    <title>Dashboard Statistiche Match</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: white;
        }

        button.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        th,
        td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        th {
            background: #f1f5f9;
        }

        tr:first-child td {
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>📊 Classifica Giocatori</h1>

    <input type="file" id="fileInput" accept="application/json" />

    <div class="controls" id="filters"></div>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Giocatore</th>
                <th>Name</th>
                <th>Cognome</th>
                <th id="statHeader">Stat</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="matches">

    </div>

    <script type="module" src="../script/pages/dashboard/dashboard.js">

    </script>

</body>

<div id="lineup-toast" class="toast hidden">
    <div class="toast-content">

        <!-- SINISTRA: LISTA GIOCATORI -->
        <div class="players-list" id="available-players"></div>

        <!-- DESTRA: META CAMPO -->
        <div class="mini-court">

            <div class="court-grid">
                <div class="slot" data-pos="4"></div>
                <div class="slot" data-pos="3"></div>
                <div class="slot" data-pos="2"></div>

                <div class="slot" data-pos="5"></div>
                <div class="slot" data-pos="6"></div>
                <div class="slot" data-pos="1"></div>
            </div>

            <div class="toast-actions">
                <button id="cancel-lineup">Annulla</button>
                <button id="confirm-lineup">Conferma</button>
            </div>

        </div>

    </div>
</div>

<style>
    .toast {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .toast.hidden {
        display: none;
    }

    .toast-content {
        width: 900px;
        height: 500px;
        background: #111;
        display: flex;
        padding: 20px;
        border-radius: 12px;
        gap: 20px;
    }

    /* SINISTRA */
    .players-list {
        width: 40%;
        background: #1c1c1c;
        overflow-y: auto;
        padding: 10px;
        border-radius: 10px;
    }

    .player-item {
        background: #333;
        padding: 10px;
        margin-bottom: 8px;
        border-radius: 8px;
        cursor: grab;
    }

    /* DESTRA */
    .mini-court {
        width: 60%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .court-grid {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap: 10px;
    }

    .slot {
        background: #222;
        border: 2px dashed #555;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .slot.filled {
        border-style: solid;
    }

    .toast-actions {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
    }
</style>
