<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoraggio Partita</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e17;
            --surf-1: #121622;
            --surf-2: #1a1f30;
            --surf-3: #222840;
            --border: rgba(255, 255, 255, .07);
            --border-m: rgba(255, 255, 255, .13);
            --a: #3b8bff;
            --a-dim: rgba(59, 139, 255, .15);
            --a-glow: rgba(59, 139, 255, .35);
            --b: #ff6b35;
            --b-dim: rgba(255, 107, 53, .15);
            --b-glow: rgba(255, 107, 53, .35);
            --green: #22d47a;
            --green-dim: rgba(34, 212, 122, .14);
            --red: #f04e4e;
            --red-dim: rgba(240, 78, 78, .14);
            --amber: #f5c542;
            --amber-dim: rgba(245, 197, 66, .14);
            --purple: #a78bfa;
            --purple-dim: rgba(167, 139, 250, .14);
            --slate: #64748b;
            --slate-dim: rgba(100, 116, 139, .14);
            --text: #e8eaf2;
            --muted: #7a829a;
            --subtle: #3c4260;
            --court: #c8a55a;
            --r: 10px;
            --r-sm: 6px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Barlow', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* ── TOP BAR ── */
        #topbar {
            display: flex;
            align-items: center;
            background: var(--surf-1);
            border-bottom: 1px solid var(--border);
            height: 52px;
            flex-shrink: 0;
            padding: 0 16px;
            position: relative;
        }

        #scoreboard {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            background: var(--surf-2);
            border: 1px solid var(--border-m);
            border-radius: var(--r);
            overflow: hidden;
            flex-shrink: 0;
            z-index: 2;
        }

        .team-score-block {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .team-score-block.b {
            flex-direction: row-reverse;
        }

        .team-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .team-name.a {
            color: var(--a);
        }

        .team-name.b {
            color: var(--b);
        }

        .score-sets {
            display: flex;
            gap: 4px;
        }

        .set-pip {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--surf-3);
            border: 1.5px solid var(--border-m);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            transition: all .2s;
        }

        .set-pip.won-a {
            background: var(--a-dim);
            border-color: var(--a);
            color: var(--a);
        }

        .set-pip.won-b {
            background: var(--b-dim);
            border-color: var(--b);
            color: var(--b);
        }

        .pts {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 42px;
            font-weight: 800;
            width: 68px;
            text-align: center;
            line-height: 1;
            padding: 6px 0 4px;
        }

        .pts.a {
            color: var(--a);
        }

        .pts.b {
            color: var(--b);
        }

        .pts-div {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 28px;
            font-weight: 300;
            color: var(--subtle);
            padding: 0 2px;
        }

        .set-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            text-align: center;
            padding: 2px 10px;
            background: var(--surf-3);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            position: absolute;
            top: 52px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* ── MAIN ── */
        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* ── BENCH PANELS ── */
        .bench-panel {
            width: 130px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            gap: 6px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }

        .bench-panel.b {
            border-right: none;
            border-left: 1px solid var(--border);
        }

        .bench-header {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2px;
        }

        .bench-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .bench-title.a {
            color: var(--a);
        }

        .bench-title.b {
            color: var(--b);
        }

        .bench-timeout {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 9px;
            color: var(--subtle);
            letter-spacing: .5px;
        }

        .bench-timeout.has-to {
            color: var(--amber);
        }

        .bench-player {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            border-radius: var(--r-sm);
            background: var(--surf-2);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all .15s;
        }

        .bench-player:hover {
            border-color: var(--border-m);
            background: var(--surf-3);
        }

        .bench-player.selected-a {
            background: var(--a-dim);
            border-color: var(--a);
        }

        .bench-player.selected-b {
            background: var(--b-dim);
            border-color: var(--b);
        }

        .bench-player.out-target {
            background: var(--amber-dim);
            border-color: var(--amber);
        }

        .bp-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .bp-num.a {
            background: var(--a);
            color: #fff;
        }

        .bp-num.b {
            background: var(--b);
            color: #fff;
        }

        .bp-name {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.2;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        /* ── COURT AREA ── */
        #court-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 12px 16px 8px;
            gap: 10px;
            min-width: 0;
            overflow: hidden;
        }

        #court-wrap {
            position: relative;
            width: 100%;
            max-width: 580px;
            flex-shrink: 0;
        }

        #court {
            width: 100%;
            aspect-ratio: 2/1.05;
            background: var(--court);
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, .2);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, .4), 0 12px 40px rgba(0, 0, 0, .6), inset 0 1px 0 rgba(255, 255, 255, .1);
        }

        #court::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(90deg, transparent calc(50% - 1px), rgba(255, 255, 255, .6) calc(50% - 1px), rgba(255, 255, 255, .6) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(90deg, transparent calc(25% - .5px), rgba(255, 255, 255, .25) calc(25% - .5px), rgba(255, 255, 255, .25) calc(25% + .5px), transparent calc(25% + .5px)),
                linear-gradient(90deg, transparent calc(75% - .5px), rgba(255, 255, 255, .25) calc(75% - .5px), rgba(255, 255, 255, .25) calc(75% + .5px), transparent calc(75% + .5px));
        }

        #court::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: rgba(255, 255, 255, .04);
            pointer-events: none;
            z-index: 0;
        }

        .net {
            position: absolute;
            left: calc(50% - 2px);
            top: -4px;
            width: 4px;
            height: calc(100% + 8px);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, .95) 8%, rgba(255, 255, 255, .95) 92%, rgba(255, 255, 255, 0) 100%);
            z-index: 4;
            border-radius: 2px;
        }

        .net::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 3px;
            background: rgba(255, 255, 255, .5);
            border-radius: 2px;
        }

        .court-player {
            position: absolute;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            z-index: 5;
            transform: translate(-50%, -50%);
            transition: transform .15s, box-shadow .15s, border-color .15s;
            border: 2.5px solid rgba(255, 255, 255, .2);
            box-shadow: 0 3px 10px rgba(0, 0, 0, .5);
        }

        .court-player.a {
            background: linear-gradient(135deg, #4a9aff, #2266dd);
            color: #fff;
        }

        .court-player.b {
            background: linear-gradient(135deg, #ff8050, #dd4020);
            color: #fff;
        }

        .court-player:hover {
            transform: translate(-50%, -50%) scale(1.12);
            box-shadow: 0 5px 20px rgba(0, 0, 0, .6);
        }

        .court-player.selected {
            border-color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .4), 0 5px 20px rgba(0, 0, 0, .6);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .court-player.libero {
            border-color: var(--amber);
            border-width: 3px;
        }

        .court-player.out-selected {
            border-color: var(--amber);
            border-width: 3px;
            box-shadow: 0 0 0 3px rgba(245, 197, 66, .4), 0 5px 20px rgba(0, 0, 0, .6);
            transform: translate(-50%, -50%) scale(1.15);
        }

        .serve-dot {
            position: absolute;
            width: 9px;
            height: 9px;
            background: var(--amber);
            border-radius: 50%;
            top: 2px;
            right: 2px;
            border: 1.5px solid #fff;
            animation: pulse-dot 1.5s infinite;
            z-index: 10;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .6;
                transform: scale(.75)
            }
        }

        /* ── MODE BANNER (sub / card) ── */
        #mode-banner {
            display: none;
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 0 0 6px 6px;
            z-index: 20;
        }

        #mode-banner.sub {
            display: block;
            background: var(--purple);
            color: #fff;
        }

        #mode-banner.card-yellow {
            display: block;
            background: var(--amber);
            color: #000;
        }

        #mode-banner.card-red {
            display: block;
            background: var(--red);
            color: #fff;
        }

        #mode-banner.cancel-btn {
            cursor: pointer;
        }

        #mode-banner.cancel-btn:hover {
            opacity: .8;
        }

        /* ── SELECTED BAR ── */
        #selected-bar {
            width: 100%;
            max-width: 580px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surf-2);
            border: 1px solid var(--border-m);
            border-radius: var(--r-sm);
            padding: 7px 12px;
            min-height: 38px;
            flex-shrink: 0;
            transition: all .2s;
        }

        #selected-bar.none {
            opacity: .4;
        }

        #selected-bar.sub-mode {
            border-color: var(--purple);
            background: var(--purple-dim);
        }

        #selected-bar.card-mode {
            border-color: var(--amber);
            background: var(--amber-dim);
        }

        .sel-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .sel-badge.a {
            background: var(--a);
            color: #fff;
        }

        .sel-badge.b {
            background: var(--b);
            color: #fff;
        }

        .sel-badge.neutral {
            background: var(--surf-3);
            color: var(--muted);
        }

        .sel-info {
            flex: 1;
        }

        .sel-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .sel-role {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        /* ── ACTION PANEL ── */
        #action-panel {
            width: 100%;
            max-width: 580px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
            min-height: 0;
        }

        .action-group {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .action-group-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--subtle);
            padding: 2px 0;
            flex-shrink: 0;
        }

        .act-btn {
            flex: 1;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 10px 6px;
            border-radius: var(--r-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .12s;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .act-btn:active {
            transform: scale(.97);
        }

        .act-btn.lg {
            font-size: 15px;
            padding: 12px 6px;
        }

        .act-btn.green {
            background: var(--green-dim);
            border-color: rgba(34, 212, 122, .3);
            color: var(--green);
        }

        .act-btn.red {
            background: var(--red-dim);
            border-color: rgba(240, 78, 78, .3);
            color: var(--red);
        }

        .act-btn.amber {
            background: var(--amber-dim);
            border-color: rgba(245, 197, 66, .3);
            color: var(--amber);
        }

        .act-btn.purple {
            background: var(--purple-dim);
            border-color: rgba(167, 139, 250, .3);
            color: var(--purple);
        }

        .act-btn.slate {
            background: var(--slate-dim);
            border-color: rgba(100, 116, 139, .3);
            color: var(--slate);
        }

        .act-btn.a-col {
            background: var(--a-dim);
            border-color: rgba(59, 139, 255, .3);
            color: var(--a);
        }

        .act-btn.b-col {
            background: var(--b-dim);
            border-color: rgba(255, 107, 53, .3);
            color: var(--b);
        }

        .act-btn.green:hover {
            background: rgba(34, 212, 122, .22);
            border-color: var(--green);
        }

        .act-btn.red:hover {
            background: rgba(240, 78, 78, .22);
            border-color: var(--red);
        }

        .act-btn.amber:hover {
            background: rgba(245, 197, 66, .22);
            border-color: var(--amber);
        }

        .act-btn.purple:hover {
            background: rgba(167, 139, 250, .22);
            border-color: var(--purple);
        }

        .act-btn.slate:hover {
            background: rgba(100, 116, 139, .22);
            border-color: var(--slate);
        }

        .act-btn.a-col:hover {
            background: rgba(59, 139, 255, .22);
            border-color: var(--a);
        }

        .act-btn.b-col:hover {
            background: rgba(255, 107, 53, .22);
            border-color: var(--b);
        }

        .act-btn.active-mode {
            box-shadow: inset 0 0 0 2px currentColor;
            opacity: 1 !important;
        }

        .act-icon {
            font-size: 14px;
            line-height: 1;
        }

        .util-controls {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .ctrl-btn {
            flex: 1;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 9px 8px;
            border-radius: var(--r-sm);
            border: 1px solid var(--border-m);
            background: var(--surf-3);
            color: var(--muted);
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .ctrl-btn:hover {
            background: var(--surf-2);
            color: var(--text);
        }

        .ctrl-btn.undo {
            color: var(--amber);
            border-color: var(--amber-dim);
        }

        .ctrl-btn.undo:hover {
            background: var(--amber-dim);
            border-color: var(--amber);
        }

        /* ── FIXED STATS BTN ── */
        #stats-fixed {
            position: fixed;
            bottom: 14px;
            right: 14px;
            z-index: 499;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 8px 16px;
            border-radius: 7px;
            border: 1px solid var(--a-dim);
            background: var(--surf-2);
            color: var(--a);
            cursor: pointer;
            transition: all .15s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, .4);
        }

        #stats-fixed:hover {
            background: var(--a-dim);
            border-color: var(--a);
        }

        /* ── FLASH ── */
        .flash {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--surf-2);
            border: 1px solid var(--border-m);
            border-radius: var(--r);
            padding: 8px 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity .2s, transform .2s;
            pointer-events: none;
            z-index: 600;
        }

        .flash.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--subtle);
            border-radius: 2px;
        }

        /* ── RIPPLE ── */
        @keyframes ripple {
            from {
                transform: scale(0);
                opacity: .4
            }

            to {
                transform: scale(4);
                opacity: 0
            }
        }

        .ripple-el {
            position: absolute;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-left: -25px;
            margin-top: -25px;
            background: rgba(255, 255, 255, .2);
            animation: ripple .4s linear forwards;
            pointer-events: none;
        }

        /* ══════════════════════════════════════════
           STATS PANEL
        ══════════════════════════════════════════ */
        #stats-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: min(740px, 95vw);
            height: 100vh;
            background: var(--surf-1);
            border-left: 1px solid var(--border-m);
            z-index: 500;
            display: flex;
            flex-direction: column;
            transition: right .3s cubic-bezier(.4, 0, .2, 1);
            box-shadow: -8px 0 32px rgba(0, 0, 0, .6);
        }

        #stats-panel.open {
            right: 0;
        }

        .sp-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-m);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .sp-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            flex-shrink: 0;
        }

        .sp-pills {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            flex: 1;
        }

        .sp-cat-btn {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .8px;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 4px;

<body>

    <!-- FLASH -->
    <div class="flash" id="flash"></div>

    <!-- TOP BAR -->
    <div id="topbar">
        <div class="team-score-block a">
            <span class="team-name a" id="team-name-a">Squadra A</span>
            <div class="score-sets" id="sets-a">
                <div class="set-pip" id="spa0">0</div>
                <div class="set-pip" id="spa1">0</div>
                <div class="set-pip" id="spa2">0</div>
            </div>
        </div>
        <div id="scoreboard">
            <div class="pts a" id="pts-a">0</div>
            <div class="pts-div">:</div>
            <div class="pts b" id="pts-b">0</div>
        </div>
        <div class="team-score-block b">
            <span class="team-name b" id="team-name-b">Squadra B</span>
            <div class="score-sets" id="sets-b">
                <div class="set-pip" id="spb0">0</div>
                <div class="set-pip" id="spb1">0</div>
                <div class="set-pip" id="spb2">0</div>
            </div>
        </div>
    </div>
    <div class="set-label" id="set-label">Set 1</div>

    <!-- MAIN -->
    <div id="main">

        <!-- Bench A -->
        <div class="bench-panel a">
            <div class="bench-header">
                <div class="bench-title a" id="bench-title-a">Panchina A</div>
                <div class="bench-timeout" id="to-a">Timeout: 0 / 2</div>
            </div>
        </div>

        <!-- Court + Actions -->
        <div id="court-area">
            <div id="court-wrap">
                <div id="court">
                    <div class="net"></div>
                </div>
                <div id="mode-banner"></div>
            </div>

            <!-- Selected player bar -->
            <div id="selected-bar" class="none">
                <div class="sel-badge neutral" id="sel-badge">–</div>
                <div class="sel-info">
                    <div class="sel-name" id="sel-name">Nessun giocatore selezionato</div>
                    <div class="sel-role" id="sel-role">Seleziona un giocatore sul campo o in panchina</div>
                </div>
            </div>

            <!-- Action panel -->
            <div id="action-panel">
                <div class="action-group-label">▸ PUNTO / ERRORE</div>
                <div class="action-group">
                    <button class="act-btn green lg" onclick="registerEvent('POINT')"><span class="act-icon">✦</span>
                        Point</button>
                    <button class="act-btn red" onclick="registerEvent('OUT')"><span class="act-icon">✕</span>
                        Out</button>
                    <button class="act-btn red" onclick="registerEvent('LOST_BALL')"><span class="act-icon">○</span>

                    <button class="act-btn slate" onclick="registerEvent('BLOCKED')"><span class="act-icon">▣</span>
